<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- fondo azul redondeado -->
  <rect width="100" height="100" rx="22" fill="#5B6BE8"/>
  <!-- línea superior horizontal -->
  <line x1="22" y1="25" x2="78" y2="25" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- línea diagonal -->
  <line x1="22" y1="25" x2="58" y2="75" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- línea vertical derecha -->
  <line x1="78" y1="25" x2="78" y2="75" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- nodo superior izquierdo -->
  <circle cx="22" cy="25" r="8" fill="#5B6BE8" stroke="white" stroke-width="6"/>
  <!-- nodo superior derecho -->
  <circle cx="78" cy="25" r="8" fill="#5B6BE8" stroke="white" stroke-width="6"/>
  <!-- nodo medio -->
  <circle cx="58" cy="75" r="8" fill="#5B6BE8" stroke="white" stroke-width="6"/>
  <!-- nodo inferior derecho -->
  <circle cx="78" cy="75" r="8" fill="#5B6BE8" stroke="white" stroke-width="6"/>
</svg>
